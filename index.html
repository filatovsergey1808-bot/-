<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Террасная доска | PRINCIP FLOOR</title>
    <meta name="description" content="Премиальная террасная доска из натурального дерева и ДПК. PRINCIP FLOOR — качество, проверенное временем.">
    <meta name="keywords" content="террасная доска, декинг, ДПК, лиственница, PRINCIP FLOOR">
    
    <style>
        /* ================================================================
           ОСНОВНОЙ ФОН
           ================================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            min-height: 100vh;
            background: #F0F3F8;
            color: #1A1A2E;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Геометрический фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 85, 164, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, rgba(0, 85, 164, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 85, 165, 0.03) 0%, transparent 50%),
                linear-gradient(180deg, #F8F9FC 0%, #E8ECF4 100%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            z-index: 0;
            pointer-events: none;
            background: 
                repeating-linear-gradient(
                    45deg,
                    transparent 0px,
                    transparent 60px,
                    rgba(0, 85, 164, 0.04) 60px,
                    rgba(0, 85, 164, 0.07) 61px,
                    rgba(0, 85, 164, 0.04) 62px,
                    transparent 63px,
                    transparent 120px
                ),
                repeating-linear-gradient(
                    -45deg,
                    transparent 0px,
                    transparent 200px,
                    rgba(0, 85, 164, 0.025) 200px,
                    rgba(0, 85, 164, 0.06) 202px,
                    rgba(0, 85, 164, 0.025) 204px,
                    transparent 206px,
                    transparent 400px
                ),
                repeating-linear-gradient(
                    30deg,
                    transparent 0px,
                    transparent 140px,
                    rgba(0, 85, 164, 0.02) 140px,
                    rgba(0, 85, 164, 0.05) 141px,
                    rgba(0, 85, 164, 0.02) 142px,
                    transparent 143px,
                    transparent 280px
                ),
                repeating-linear-gradient(
                    -30deg,
                    transparent 0px,
                    transparent 90px,
                    rgba(0, 85, 164, 0.03) 90px,
                    rgba(0, 85, 164, 0.08) 92px,
                    rgba(0, 85, 164, 0.03) 94px,
                    transparent 96px,
                    transparent 180px
                );
            transform: rotate(0deg) scale(1.1);
            animation: gridFloat 25s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes gridFloat {
            0% { transform: rotate(0deg) scale(1.05) translate(0, 0); }
            20% { transform: rotate(0.5deg) scale(1.08) translate(1%, -1%); }
            40% { transform: rotate(-0.3deg) scale(1.03) translate(-1%, 1%); }
            60% { transform: rotate(0.8deg) scale(1.1) translate(1%, 1%); }
            80% { transform: rotate(-0.5deg) scale(1.06) translate(-1%, -1%); }
            100% { transform: rotate(0.3deg) scale(1.12) translate(0, 0); }
        }

        .geo-shapes {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .geo-shape {
            position: absolute;
            border: 1px solid rgba(0, 85, 164, 0.04);
            border-radius: 2px;
            animation: shapeFloat 18s ease-in-out infinite alternate;
        }

        .geo-shape:nth-child(1) {
            width: 400px;
            height: 200px;
            top: -50px;
            right: -100px;
            transform: rotate(25deg);
            background: linear-gradient(135deg, rgba(0, 85, 164, 0.015), rgba(0, 85, 164, 0.05));
            animation-duration: 22s;
        }

        .geo-shape:nth-child(2) {
            width: 150px;
            height: 300px;
            bottom: 50px;
            left: -60px;
            transform: rotate(-15deg);
            background: linear-gradient(225deg, rgba(0, 85, 164, 0.01), rgba(0, 85, 164, 0.04));
            animation-duration: 26s;
            animation-delay: -6s;
        }

        .geo-shape:nth-child(3) {
            width: 100px;
            height: 100px;
            top: 35%;
            left: 55%;
            transform: rotate(45deg);
            background: linear-gradient(45deg, rgba(0, 85, 164, 0.02), rgba(0, 85, 164, 0.06));
            animation-duration: 30s;
            animation-delay: -12s;
        }

        .geo-shape:nth-child(4) {
            width: 250px;
            height: 150px;
            top: 15%;
            left: 15%;
            transform: rotate(60deg);
            background: linear-gradient(135deg, rgba(0, 85, 164, 0.01), rgba(0, 85, 164, 0.04));
            animation-duration: 24s;
            animation-delay: -4s;
        }

        .geo-shape:nth-child(5) {
            width: 180px;
            height: 180px;
            bottom: -30px;
            right: 25%;
            transform: rotate(-30deg);
            background: linear-gradient(225deg, rgba(0, 85, 164, 0.015), rgba(0, 85, 164, 0.05));
            animation-duration: 28s;
            animation-delay: -9s;
        }

        @keyframes shapeFloat {
            0% { transform: rotate(25deg) translate(0, 0) scale(1); opacity: 0.4; }
            33% { transform: rotate(35deg) translate(12px, -18px) scale(1.06); opacity: 0.9; }
            66% { transform: rotate(15deg) translate(-12px, 12px) scale(0.94); opacity: 0.5; }
            100% { transform: rotate(30deg) translate(6px, -6px) scale(1.03); opacity: 0.7; }
        }

        @keyframes shapeFloat2 {
            0% { transform: rotate(-15deg) translate(0, 0) scale(1); opacity: 0.3; }
            50% { transform: rotate(-25deg) translate(-18px, 12px) scale(1.08); opacity: 0.8; }
            100% { transform: rotate(-5deg) translate(12px, -12px) scale(0.94); opacity: 0.5; }
        }

        @keyframes shapeFloat3 {
            0% { transform: rotate(45deg) translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: rotate(55deg) translate(10px, -15px) scale(1.1); opacity: 0.8; }
        }

        .geo-shape:nth-child(2) { animation-name: shapeFloat2; }
        .geo-shape:nth-child(3) { animation-name: shapeFloat3; }
        .geo-shape:nth-child(4) { animation-name: shapeFloat2; }
        .geo-shape:nth-child(5) { animation-name: shapeFloat3; }

        /* ================================================================
           ОСНОВНОЙ КОНТЕНТ
           ================================================================ */
        #app {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ================================================================
           ВЕРХНЯЯ ПАНЕЛЬ — логотип и контакты
           ================================================================ */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0 16px 0;
            gap: 20px;
        }

        .top-bar .social-left {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: flex-start;
        }

        .top-bar .social-left .social-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(0, 85, 164, 0.06);
            color: #0055A4;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 85, 164, 0.06);
            padding: 0;
        }

        .top-bar .social-left .social-icon:hover {
            background: #0055A4;
            color: #ffffff;
            border-color: #0055A4;
            transform: translateY(-3px);
            box-shadow: 0 4px 16px rgba(0, 85, 164, 0.2);
        }

        .top-bar .social-left .social-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            display: block;
        }

        .top-bar .social-left .social-icon:hover svg {
            fill: #ffffff;
        }

        .top-bar .logo-center {
            flex: 0 0 auto;
        }

        .top-bar .logo-center img {
            display: block;
            width: 220px;
            height: auto;
            filter: drop-shadow(0 2px 12px rgba(0, 85, 164, 0.08));
            transition: filter 0.3s ease;
            cursor: pointer;
        }

        .top-bar .logo-center img:hover {
            filter: drop-shadow(0 4px 24px rgba(0, 85, 164, 0.16));
        }

        .top-bar .contact-right {
            flex: 1;
            text-align: right;
            font-size: 14px;
            color: #4A4A5A;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .top-bar .contact-right a {
            color: #0055A4;
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 400;
        }

        .top-bar .contact-right a:hover {
            color: #003D7A;
        }

        /* ================================================================
           ШАПКА
           ================================================================ */
        .header {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 32px 32px 28px 32px;
            margin-bottom: 28px;
            text-align: center;
            border: 1px solid rgba(0, 85, 164, 0.2);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            background: 
                repeating-linear-gradient(
                    15deg,
                    transparent 0px,
                    transparent 80px,
                    rgba(0, 85, 164, 0.03) 80px,
                    rgba(0, 85, 164, 0.06) 81px,
                    rgba(0, 85, 164, 0.03) 82px,
                    transparent 83px,
                    transparent 160px
                ),
                repeating-linear-gradient(
                    -25deg,
                    transparent 0px,
                    transparent 120px,
                    rgba(0, 85, 164, 0.02) 120px,
                    rgba(0, 85, 164, 0.05) 122px,
                    rgba(0, 85, 164, 0.02) 124px,
                    transparent 126px,
                    transparent 240px
                );
            opacity: 0.5;
        }

        .header h1 {
            position: relative;
            z-index: 1;
            font-size: 48px;
            font-weight: 200;
            letter-spacing: 6px;
            color: #000000;
            text-transform: uppercase;
            line-height: 1.05;
        }

        .header .subtitle {
            position: relative;
            z-index: 1;
            font-size: 16px;
            font-weight: 200;
            color: #4A4A5A;
            margin-top: 6px;
            letter-spacing: 2px;
        }

        /* ================================================================
           КАРУСЕЛЬ — БЕЗ МИГАНИЯ (FINAL)
           ================================================================ */
        .carousel-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            padding: 0;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            width: 100%;
            height: 0;
            padding-bottom: 100%;
            position: relative;
        }

        .carousel-track {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            align-items: center;
            will-change: transform;
            width: 100%;
            height: 100%;
        }

        .carousel-slide {
            flex: 0 0 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 16px;
            width: 100%;
            height: 100%;
        }

        /* ================================================================
           КАРТОЧКА — КВАДРАТНАЯ
           ================================================================ */
        .card {
            flex: 0 0 100%;
            max-width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s ease;
            border: 1.5px solid transparent;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 85, 164, 0.06);
            opacity: 0.2;
            transform: scale(0.85);
            filter: blur(4px);
            pointer-events: none;
        }

        .card.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);
            pointer-events: all;
            border-color: rgba(0, 85, 164, 0.15);
            box-shadow: 0 12px 50px rgba(0, 85, 164, 0.12);
            z-index: 3;
        }

        .card.active:hover {
            transform: scale(1.02);
            box-shadow: 0 16px 60px rgba(0, 85, 164, 0.15);
            border-color: rgba(0, 85, 164, 0.25);
            background: rgba(255, 255, 255, 0.98);
        }

        .card .image {
            width: 100%;
            height: 70%;
            object-fit: cover;
            display: block;
            background: #E8ECF0;
            flex-shrink: 0;
        }

        .card .image-placeholder {
            width: 100%;
            height: 70%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            background: #E8ECF0;
            color: #B0B8C0;
            flex-shrink: 0;
        }

        .card .info {
            padding: 14px 16px 16px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 30%;
        }

        .card .name {
            font-weight: 300;
            font-size: clamp(16px, 2.2vw, 26px);
            letter-spacing: 2px;
            color: #000000;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .card .price {
            color: #0055A4;
            font-size: clamp(14px, 1.8vw, 22px);
            font-weight: 400;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        /* ================================================================
           КНОПКИ НАВИГАЦИИ — УВЕЛИЧЕННАЯ ОБЛАСТЬ
           ================================================================ */
        .carousel-btn {
            position: absolute;
            top: 0;
            bottom: 0;
            z-index: 10;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0, 85, 164, 0.1);
            transition: all 0.3s ease;
            padding: 0;
            opacity: 0.2;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border-radius: 0;
            /* УВЕЛИЧЕННАЯ ОБЛАСТЬ: ширина в 2 раза больше */
            width: 80px;
        }

        .carousel-btn:hover {
            opacity: 0.6;
            color: #0055A4;
            background: rgba(0, 85, 164, 0.04);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .carousel-btn:active {
            transform: scale(0.95);
        }

        .carousel-btn.prev {
            left: 0;
            justify-content: flex-start;
            padding-left: 8px;
        }

        .carousel-btn.next {
            right: 0;
            justify-content: flex-end;
            padding-right: 8px;
        }

        .carousel-btn svg {
            width: 36px;
            height: 36px;
            fill: currentColor;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .carousel-btn:hover svg {
            transform: scale(1.15);
        }

        /* ================================================================
           ТОЧКИ
           ================================================================ */
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 16px 0 8px 0;
        }

        .carousel-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1.5px solid rgba(0, 85, 164, 0.15);
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .carousel-dot.active {
            background: #0055A4;
            border-color: #0055A4;
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(0, 85, 164, 0.15);
        }

        .carousel-dot:hover {
            border-color: #0055A4;
            transform: scale(1.1);
        }

        /* ================================================================
           ФУТЕР (без копирайта)
           ================================================================ */
        .footer {
            text-align: center;
            padding: 16px 14px 8px 14px;
            border-top: 1px solid rgba(0, 85, 164, 0.04);
            margin-top: 8px;
        }

        .footer .contacts {
            font-size: 13px;
            color: #8A8A9A;
        }

        .footer .contacts a {
            color: #0055A4;
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 400;
        }

        .footer .contacts a:hover {
            color: #003D7A;
        }

        /* ================================================================
           МОДАЛЬНОЕ ОКНО
           ================================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 85, 164, 0.12);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            max-width: 520px;
            width: 100%;
            padding: 32px 28px 28px;
            box-shadow: 0 20px 80px rgba(0, 85, 164, 0.15);
            animation: modalFadeIn 0.4s ease;
            max-height: 90vh;
            overflow-y: auto;
            border-top: 4px solid #0055A4;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 24px;
            color: #8A8A9A;
            cursor: pointer;
            transition: color 0.3s ease;
            padding: 0 4px;
        }

        .modal .modal-close:hover {
            color: #1A1A2E;
        }

        .modal h2 {
            font-size: 22px;
            font-weight: 200;
            letter-spacing: 2px;
            color: #000000;
            text-transform: uppercase;
            margin-top: 4px;
            margin-bottom: 6px;
        }

        .modal .modal-price {
            font-size: 20px;
            color: #0055A4;
            font-weight: 400;
            margin-bottom: 12px;
        }

        .modal .modal-desc {
            font-size: 15px;
            color: #4A4A5A;
            font-weight: 300;
            line-height: 1.7;
            margin-bottom: 16px;
        }

        .modal .modal-section {
            padding: 12px 0;
            border-top: 1px solid rgba(0, 85, 164, 0.04);
        }

        .modal .modal-section h4 {
            font-size: 12px;
            letter-spacing: 1px;
            color: #8A8A9A;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 400;
        }

        .modal .modal-section p {
            font-size: 15px;
            color: #4A4A5A;
            font-weight: 300;
            line-height: 1.6;
            white-space: pre-line;
        }

        .modal .btn-close-modal {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: #0055A4;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 85, 164, 0.2);
        }

        .modal .btn-close-modal:hover {
            background: #003D7A;
            box-shadow: 0 8px 30px rgba(0, 85, 164, 0.3);
            transform: translateY(-2px);
        }

        /* ================================================================
           АДАПТИВНОСТЬ
           ================================================================ */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .top-bar {
                flex-direction: column;
                padding: 4px 0 12px 0;
                gap: 10px;
            }

            .top-bar .social-left {
                flex: none;
                justify-content: center;
                width: 100%;
            }

            .top-bar .logo-center img {
                width: 180px;
            }

            .top-bar .contact-right {
                flex: none;
                text-align: center;
                font-size: 13px;
                width: 100%;
            }

            .header {
                padding: 24px 20px 20px 20px;
                margin-bottom: 20px;
            }

            .header h1 {
                font-size: 32px;
                letter-spacing: 4px;
            }

            .header .subtitle {
                font-size: 14px;
            }

            .carousel-slide {
                padding: 0 12px;
            }

            /* Уменьшаем кнопки на планшетах */
            .carousel-btn {
                width: 50px;
            }

            .carousel-btn svg {
                width: 28px;
                height: 28px;
            }

            .geo-shape:nth-child(1),
            .geo-shape:nth-child(2),
            .geo-shape:nth-child(5) {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .top-bar .logo-center img {
                width: 150px;
            }

            .top-bar .social-left .social-icon {
                width: 34px;
                height: 34px;
            }

            .top-bar .social-left .social-icon svg {
                width: 17px;
                height: 17px;
            }

            .header h1 {
                font-size: 24px;
                letter-spacing: 2px;
            }

            .header .subtitle {
                font-size: 12px;
            }

            .carousel-slide {
                padding: 0 8px;
            }

            .card {
                border-radius: 14px;
            }

            .card .image {
                height: 65%;
            }

            .card .image-placeholder {
                height: 65%;
            }

            .card .info {
                padding: 8px 10px 10px;
            }

            /* Уменьшаем кнопки на телефонах */
            .carousel-btn {
                width: 40px;
            }

            .carousel-btn svg {
                width: 20px;
                height: 20px;
            }

            .geo-shape:nth-child(3),
            .geo-shape:nth-child(4) {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- ГЕОМЕТРИЧЕСКИЙ ФОН -->

                cons: '❌ Требует предварительного заказа\n❌ Зависит от погодных условий',
                care: '🔧 Используем нержавеющий крепёж\n📏 Соблюдаем зазоры (5-8 мм)\n🌬️ Обеспечиваем вентиляцию\n🛡️ Обработка защитными составами',
                specs: '⏳ Срок службы: от 15 лет\n📊 Рекомендации: Уклон 1-2%\n💧 Защита от влаги'

        // ================================================================
        // БЕСКОНЕЧНАЯ КАРУСЕЛЬ — БЕЗ МИГАНИЯ (ОКОНЧАТЕЛЬНОЕ РЕШЕНИЕ)
        // ================================================================
        let currentIndex = 0;
        let autoPlayTimer = null;
        const AUTO_PLAY_INTERVAL = 4000;
        let isTransitioning = false;
        let track, slides, totalSlides;

        function createInfiniteSlides() {
            const slidesArray = [];
            
            categories.forEach((cat, i) => {
                slidesArray.push({ id: cat.id, name: cat.name, image: cat.image, price: cat.price, isClone: false, realIndex: i });
            });
            
            const cloneFirst = { ...slidesArray[0], isClone: true, realIndex: 0 };
            const cloneLast = { ...slidesArray[slidesArray.length - 1], isClone: true, realIndex: slidesArray.length - 1 };
            
            return [cloneLast, ...slidesArray, cloneFirst];
        }

        function initCarousel() {
            track = document.getElementById('carouselTrack');
            const dotsContainer = document.getElementById('dotsContainer');

            track.innerHTML = '';

            const infiniteSlides = createInfiniteSlides();
            totalSlides = infiniteSlides.length;

            infiniteSlides.forEach((slideData, index) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.dataset.index = index;
                slide.dataset.realIndex = slideData.realIndex;
                slide.dataset.isClone = slideData.isClone ? 'true' : 'false';

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img class="image" src="${slideData.image}" alt="${slideData.name}" loading="lazy" 
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="image-placeholder" style="display:none;">📦</div>
                    <div class="info">
                        <div class="name">${slideData.name}</div>
                        <div class="price">${slideData.price}</div>
                    </div>
                `;
                card.onclick = () => openModal(slideData.id);
                slide.appendChild(card);
                track.appendChild(slide);
            });

            slides = track.querySelectorAll('.carousel-slide');

            // Начинаем с первого реального слайда (индекс 1)
            currentIndex = 1;
            updateCarousel(true);

            dotsContainer.innerHTML = '';
            for (let i = 0; i < categories.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(i + 1);
                dotsContainer.appendChild(dot);
            }

            startAutoPlay();
        }

        function updateCarousel(instant = false) {
            if (!track) return;

            if (instant) {
                track.style.transition = 'none';
            } else {
                track.style.transition = 'transform 0.7s cubic-bezier(0.4, 0, 0.2, 1)';
            }

            const offset = -currentIndex * 100;
            track.style.transform = `translateX(${offset}%)`;

            slides.forEach((slide, idx) => {
                const cards = slide.querySelectorAll('.card');
                const isActive = idx === currentIndex;

                cards.forEach(card => {
                    card.classList.toggle('active', isActive);
                });
            });

            const dots = document.querySelectorAll('.carousel-dot');
            let realIndex = currentIndex - 1;
            if (realIndex < 0) realIndex = categories.length - 1;
            if (realIndex >= categories.length) realIndex = 0;
            
            dots.forEach((dot, idx) => {
                dot.classList.toggle('active', idx === realIndex);
            });

            if (instant) {
                track.offsetHeight;
                track.style.transition = 'transform 0.7s cubic-bezier(0.4, 0, 0.2, 1)';
            }
        }

        function goToSlide(index, instant = false) {
            if (isTransitioning) return;
            
            if (index < 0) index = 0;
            if (index >= totalSlides) index = totalSlides - 1;
            
            currentIndex = index;
            updateCarousel(instant);
            
            // Проверяем границы для бесконечного цикла
            if (currentIndex === 0) {
                isTransitioning = true;
                setTimeout(() => {
                    // Плавно переключаемся на последний реальный слайд
                    currentIndex = totalSlides - 2;
                    // Делаем мгновенный переход без анимации
                    track.style.transition = 'none';
                    const offset = -currentIndex * 100;
                    track.style.transform = `translateX(${offset}%)`;
                    track.offsetHeight;
                    track.style.transition = 'transform 0.7s cubic-bezier(0.4, 0, 0.2, 1)';
                    
                    // Обновляем состояние
                    slides.forEach((slide, idx) => {
                        const cards = slide.querySelectorAll('.card');
                        const isActive = idx === currentIndex;
                        cards.forEach(card => {
                            card.classList.toggle('active', isActive);
                        });
                    });
                    const dots = document.querySelectorAll('.carousel-dot');
                    let realIndex = currentIndex - 1;
                    if (realIndex < 0) realIndex = categories.length - 1;
                    if (realIndex >= categories.length) realIndex = 0;
                    dots.forEach((dot, idx) => {
                        dot.classList.toggle('active', idx === realIndex);
                    });
                    isTransitioning = false;
                }, 700);
            } else if (currentIndex === totalSlides - 1) {
                isTransitioning = true;
                setTimeout(() => {
                    // Плавно переключаемся на первый реальный слайд
                    currentIndex = 1;
                    track.style.transition = 'none';
                    const offset = -currentIndex * 100;
                    track.style.transform = `translateX(${offset}%)`;
                    track.offsetHeight;
                    track.style.transition = 'transform 0.7s cubic-bezier(0.4, 0, 0.2, 1)';
                    
                    slides.forEach((slide, idx) => {
                        const cards = slide.querySelectorAll('.card');
                        const isActive = idx === currentIndex;
                        cards.forEach(card => {
                            card.classList.toggle('active', isActive);
                        });
                    });
                    const dots = document.querySelectorAll('.carousel-dot');
                    let realIndex = currentIndex - 1;
                    if (realIndex < 0) realIndex = categories.length - 1;
                    if (realIndex >= categories.length) realIndex = 0;
                    dots.forEach((dot, idx) => {
                        dot.classList.toggle('active', idx === realIndex);
                    });
                    isTransitioning = false;
                }, 700);
            } else {
                if (!instant) {
                    isTransitioning = true;
                    setTimeout(() => {
                        isTransitioning = false;
                    }, 700);
                } else {
                    isTransitioning = false;
                }
            }

            resetAutoPlay();
        }

        function nextSlide() {
            if (isTransitioning) return;
            goToSlide(currentIndex + 1);
        }

        function prevSlide() {
            if (isTransitioning) return;
            goToSlide(currentIndex - 1);
        }

        function startAutoPlay() {
            stopAutoPlay();
            autoPlayTimer = setInterval(() => {
                nextSlide();
            }, AUTO_PLAY_INTERVAL);
        }

        function stopAutoPlay() {
            if (autoPlayTimer) {
                clearInterval(autoPlayTimer);
                autoPlayTimer = null;
            }
        }

        function resetAutoPlay() {
            stopAutoPlay();
            startAutoPlay();
        }

        // ================================================================
        // МОДАЛЬНОЕ ОКНО
        // ================================================================
        function openModal(id) {
            const data = categories.find(c => c.id === id);
            const detail = details[id];
            if (!data || !detail) return;

            document.getElementById('modalName').textContent = data.name;
            document.getElementById('modalPrice').textContent = data.price;
            document.getElementById('modalDesc').textContent = detail.desc;
            document.getElementById('modalPros').textContent = detail.pros;
            document.getElementById('modalCons').textContent = detail.cons;
            document.getElementById('modalCare').textContent = detail.care;
            document.getElementById('modalSpecs').textContent = detail.specs;

            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            stopAutoPlay();
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = 'auto';
            startAutoPlay();
        }

        // ================================================================
        // ЗАПУСК
        // ================================================================
        document.addEventListener('DOMContentLoaded', () => {
            initCarousel();

            const wrapper = document.getElementById('carouselWrapper');

            document.getElementById('prevBtn').onclick = (e) => {
                e.stopPropagation();
                prevSlide();
            };

            document.getElementById('nextBtn').onclick = (e) => {
                e.stopPropagation();
                nextSlide();
            };

            wrapper.addEventListener('mouseenter', stopAutoPlay);
            wrapper.addEventListener('mouseleave', startAutoPlay);
            wrapper.addEventListener('touchstart', stopAutoPlay);
            wrapper.addEventListener('touchend', startAutoPlay);

            document.getElementById('modalClose').onclick = closeModal;
            document.getElementById('modalCloseBtn').onclick = closeModal;
            document.getElementById('modalOverlay').onclick = (e) => {
                if (e.target === e.currentTarget) closeModal();
            };

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
                if (e.key === 'ArrowLeft') prevSlide();
                if (e.key === 'ArrowRight') nextSlide();
            });
        });
    </script>
