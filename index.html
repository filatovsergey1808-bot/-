<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Террасная доска | PRINCIP FLOOR</title>
    <meta name="description" content="Премиальная террасная доска из натурального дерева и ДПК. PRINCIP FLOOR — качество, проверенное временем.">
    <meta name="keywords" content="террасная доска, декинг, ДПК, лиственница, PRINCIP FLOOR">
    
    <style>
        /* ================================================================
           CSS ПЕРЕМЕННЫЕ
           ================================================================ */
        :root {
            --color-primary: #0055A4;
            --color-primary-dark: #003D7A;
            --color-primary-light: #E8F0F8;
            --color-primary-soft: rgba(0, 85, 164, 0.15);
            --color-white: #FFFFFF;
            --color-light-bg: #F0F3F8;
            --color-text-primary: #000000;
            --color-text-secondary: #4A4A5A;
            --color-text-light: #8A8A9A;
            --color-border: #E5E8EC;
            --shadow-card: 0 4px 16px rgba(0, 85, 164, 0.08);
            --shadow-card-hover: 0 12px 40px rgba(0, 85, 164, 0.12);
            --radius-card: 16px;
            --transition: 0.3s ease;
        }

        /* ================================================================
           ОСНОВНОЙ ФОН
           ================================================================ */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            min-height: 100vh;
            background: var(--color-light-bg);
            color: var(--color-text-primary);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 85, 164, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, rgba(0, 85, 164, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 85, 165, 0.03) 0%, transparent 50%),
                linear-gradient(180deg, #F8F9FC 0%, #E8ECF4 100%);
            pointer-events: none;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            z-index: 0;
            pointer-events: none;
            background: 
                repeating-linear-gradient(
                    45deg,
                    transparent 0px,
                    transparent 60px,
                    rgba(0, 85, 164, 0.04) 60px,
                    rgba(0, 85, 164, 0.07) 61px,
                    rgba(0, 85, 164, 0.04) 62px,
                    transparent 63px,
                    transparent 120px
                ),
                repeating-linear-gradient(
                    -45deg,
                    transparent 0px,
                    transparent 200px,
                    rgba(0, 85, 164, 0.025) 200px,
                    rgba(0, 85, 164, 0.06) 202px,
                    rgba(0, 85, 164, 0.025) 204px,
                    transparent 206px,
                    transparent 400px
                ),
                repeating-linear-gradient(
                    30deg,
                    transparent 0px,
                    transparent 140px,
                    rgba(0, 85, 164, 0.02) 140px,
                    rgba(0, 85, 164, 0.05) 141px,
                    rgba(0, 85, 164, 0.02) 142px,
                    transparent 143px,
                    transparent 280px
                ),
                repeating-linear-gradient(
                    -30deg,
                    transparent 0px,
                    transparent 90px,
                    rgba(0, 85, 164, 0.03) 90px,
                    rgba(0, 85, 164, 0.08) 92px,
                    rgba(0, 85, 164, 0.03) 94px,
                    transparent 96px,
                    transparent 180px
                ),
                repeating-linear-gradient(
                    15deg,
                    transparent 0px,
                    transparent 160px,
                    rgba(0, 85, 164, 0.015) 160px,
                    rgba(0, 85, 164, 0.04) 162px,
                    rgba(0, 85, 164, 0.015) 164px,
                    transparent 166px,
                    transparent 320px
                ),
                repeating-linear-gradient(
                    -15deg,
                    transparent 0px,
                    transparent 240px,
                    rgba(0, 85, 164, 0.01) 240px,
                    rgba(0, 85, 164, 0.035) 243px,
                    rgba(0, 85, 164, 0.01) 246px,
                    transparent 249px,
                    transparent 480px
                ),
                repeating-linear-gradient(
                    50deg,
                    transparent 0px,
                    transparent 350px,
                    rgba(0, 85, 164, 0.01) 350px,
                    rgba(0, 85, 164, 0.03) 354px,
                    rgba(0, 85, 164, 0.01) 358px,
                    transparent 362px,
                    transparent 700px
                ),
                repeating-linear-gradient(
                    -50deg,
                    transparent 0px,
                    transparent 40px,
                    rgba(0, 85, 164, 0.02) 40px,
                    rgba(0, 85, 164, 0.05) 41px,
                    rgba(0, 85, 164, 0.02) 42px,
                    transparent 43px,
                    transparent 80px
                );
            transform: rotate(0deg) scale(1.1);
            animation: gridFloat 25s ease-in-out infinite alternate;
        }
        
        @keyframes gridFloat {
            0% { transform: rotate(0deg) scale(1.05) translate(0, 0); }
            20% { transform: rotate(0.5deg) scale(1.08) translate(1%, -1%); }
            40% { transform: rotate(-0.3deg) scale(1.03) translate(-1%, 1%); }
            60% { transform: rotate(0.8deg) scale(1.1) translate(1%, 1%); }
            80% { transform: rotate(-0.5deg) scale(1.06) translate(-1%, -1%); }
            100% { transform: rotate(0.3deg) scale(1.12) translate(0, 0); }
        }
        
        .geometry-overlay {
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            z-index: 0;
            pointer-events: none;
            background: 
                repeating-linear-gradient(
                    35deg,
                    transparent 0px,
                    transparent 180px,
                    rgba(255, 255, 255, 0.04) 180px,
                    rgba(255, 255, 255, 0.01) 181px,
                    transparent 182px,
                    transparent 360px
                ),
                repeating-linear-gradient(
                    -35deg,
                    transparent 0px,
                    transparent 220px,
                    rgba(255, 255, 255, 0.03) 220px,
                    rgba(255, 255, 255, 0.01) 221px,
                    transparent 222px,
                    transparent 440px
                ),
                radial-gradient(circle at 30% 40%, rgba(255,255,255,0.02) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(255,255,255,0.015) 0%, transparent 40%);
            transform: rotate(0deg) scale(1.1);
            animation: gridFloat 20s ease-in-out infinite alternate-reverse;
        }
        
        .geo-shapes {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .geo-shape {
            position: absolute;
            border: 1px solid rgba(0, 85, 164, 0.04);
            border-radius: 2px;
            animation: shapeFloat 18s ease-in-out infinite alternate;
        }
        
        .geo-shape:nth-child(1) {
            width: 400px;
            height: 200px;
            top: -50px;
            right: -100px;
            transform: rotate(25deg);
            background: linear-gradient(135deg, rgba(0, 85, 164, 0.015), rgba(0, 85, 164, 0.05));
            animation-duration: 22s;
        }
        
        .geo-shape:nth-child(2) {
            width: 150px;
            height: 300px;
            bottom: 50px;
            left: -60px;
            transform: rotate(-15deg);
            background: linear-gradient(225deg, rgba(0, 85, 164, 0.01), rgba(0, 85, 164, 0.04));
            animation-duration: 26s;
            animation-delay: -6s;
        }
        
        .geo-shape:nth-child(3) {
            width: 100px;
            height: 100px;
            top: 35%;
            left: 55%;
            transform: rotate(45deg);
            background: linear-gradient(45deg, rgba(0, 85, 164, 0.02), rgba(0, 85, 164, 0.06));
            animation-duration: 30s;
            animation-delay: -12s;
        }
        
        .geo-shape:nth-child(4) {
            width: 250px;
            height: 150px;
            top: 15%;
            left: 15%;
            transform: rotate(60deg);
            background: linear-gradient(135deg, rgba(0, 85, 164, 0.01), rgba(0, 85, 164, 0.04));
            animation-duration: 24s;
            animation-delay: -4s;
        }
        
        .geo-shape:nth-child(5) {
            width: 180px;
            height: 180px;
            bottom: -30px;
            right: 25%;
            transform: rotate(-30deg);
            background: linear-gradient(225deg, rgba(0, 85, 164, 0.015), rgba(0, 85, 164, 0.05));
            animation-duration: 28s;
            animation-delay: -9s;
        }
        
        @keyframes shapeFloat {
            0% { transform: rotate(25deg) translate(0, 0) scale(1); opacity: 0.4; }
            33% { transform: rotate(35deg) translate(12px, -18px) scale(1.06); opacity: 0.9; }
            66% { transform: rotate(15deg) translate(-12px, 12px) scale(0.94); opacity: 0.5; }
            100% { transform: rotate(30deg) translate(6px, -6px) scale(1.03); opacity: 0.7; }
        }
        
        @keyframes shapeFloat2 {
            0% { transform: rotate(-15deg) translate(0, 0) scale(1); opacity: 0.3; }
            50% { transform: rotate(-25deg) translate(-18px, 12px) scale(1.08); opacity: 0.8; }
            100% { transform: rotate(-5deg) translate(12px, -12px) scale(0.94); opacity: 0.5; }
        }
        
        @keyframes shapeFloat3 {
            0% { transform: rotate(45deg) translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: rotate(55deg) translate(10px, -15px) scale(1.1); opacity: 0.8; }
        }
        
        .geo-shape:nth-child(2) { animation-name: shapeFloat2; }
        .geo-shape:nth-child(3) { animation-name: shapeFloat3; }
        .geo-shape:nth-child(4) { animation-name: shapeFloat2; }
        .geo-shape:nth-child(5) { animation-name: shapeFloat3; }
        
        /* ================================================================
           ОСНОВНОЙ КОНТЕНТ
           ================================================================ */
        #app {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        /* ================================================================
           ВЕРХНЯЯ ПАНЕЛЬ — иконки слева, логотип центр, телефон справа
           ================================================================ */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0 16px 0;
            gap: 20px;
        }
        
        .top-bar .social-left {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 16px;
            justify-content: flex-start;
        }
        
        .top-bar .social-left .social-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 85, 164, 0.06);
            color: var(--color-primary);
            text-decoration: none;
            font-size: 18px;
            transition: all var(--transition);
            border: 1px solid rgba(0, 85, 164, 0.06);
        }
        
        .top-bar .social-left .social-icon:hover {
            background: var(--color-primary);
            color: #ffffff;
            border-color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 85, 164, 0.2);
        }
        
        .top-bar .social-left .social-icon:active {
            transform: scale(0.92);
        }
        
        .top-bar .logo-center {
            flex: 0 0 auto;
        }
        
        .top-bar .logo-center img {
            display: block;
            width: 220px;
            height: auto;
            filter: drop-shadow(0 2px 12px rgba(0, 85, 164, 0.08));
            transition: filter var(--transition);
            cursor: pointer;
        }
        
        .top-bar .logo-center img:hover {
            filter: drop-shadow(0 4px 24px rgba(0, 85, 164, 0.16));
        }
        
        .top-bar .contact-right {
            flex: 1;
            text-align: right;
            font-size: 14px;
            color: var(--color-text-secondary);
            font-weight: 300;
            letter-spacing: 0.3px;
        }
        
        .top-bar .contact-right a {
            color: var(--color-primary);
            text-decoration: none;
            transition: color var(--transition);
            font-weight: 400;
        }
        
        .top-bar .contact-right a:hover {
            color: var(--color-primary-dark);
        }
        
        /* ================================================================
           ШАПКА — с мягкой синей рамкой
           ================================================================ */
        .header {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 32px 32px 28px 32px;
            margin-bottom: 28px;
            box-shadow: 0 8px 40px rgba(0, 85, 164, 0.06);
            border: 1px solid rgba(0, 85, 164, 0.2);
            position: relative;
            overflow: hidden;
            text-align: center;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            background: 
                repeating-linear-gradient(
                    15deg,
                    transparent 0px,
                    transparent 80px,
                    rgba(0, 85, 164, 0.03) 80px,
                    rgba(0, 85, 164, 0.06) 81px,
                    rgba(0, 85, 164, 0.03) 82px,
                    transparent 83px,
                    transparent 160px
                ),
                repeating-linear-gradient(
                    -25deg,
                    transparent 0px,
                    transparent 120px,
                    rgba(0, 85, 164, 0.02) 120px,
                    rgba(0, 85, 164, 0.05) 122px,
                    rgba(0, 85, 164, 0.02) 124px,
                    transparent 126px,
                    transparent 240px
                ),
                repeating-linear-gradient(
                    5deg,
                    transparent 0px,
                    transparent 200px,
                    rgba(0, 85, 164, 0.015) 200px,
                    rgba(0, 85, 164, 0.04) 203px,
                    rgba(0, 85, 164, 0.015) 206px,
                    transparent 209px,
                    transparent 400px
                ),
                repeating-linear-gradient(
                    -40deg,
                    transparent 0px,
                    transparent 160px,
                    rgba(0, 85, 164, 0.01) 160px,
                    rgba(0, 85, 164, 0.035) 163px,
                    rgba(0, 85, 164, 0.01) 166px,
                    transparent 169px,
                    transparent 320px
                );
            opacity: 0.5;
        }
        
        .header h1 {
            position: relative;
            z-index: 1;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            font-size: 48px;
            font-weight: 200;
            letter-spacing: 6px;
            color: #000000;
            text-transform: uppercase;
            line-height: 1.05;
        }
        
        .header .subtitle {
            position: relative;
            z-index: 1;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            font-size: 16px;
            font-weight: 200;
            color: var(--color-text-secondary);
            margin-top: 6px;
            letter-spacing: 2px;
        }
        
        /* ================================================================
           СЕТКА КАТАЛОГА — 3 колонки, 2 ряда
           ================================================================ */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            width: 100%;
            margin: 0 auto;
        }
        
        /* ================================================================
           КАРТОЧКА — с мягкой подсветкой при наведении
           ================================================================ */
        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius-card);
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 85, 164, 0.06);
            cursor: pointer;
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
            border: 1.5px solid transparent;
        }
        
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 16px 60px rgba(0, 85, 164, 0.12);
            border-color: rgba(0, 85, 164, 0.25);
            background: rgba(255, 255, 255, 0.98);
            z-index: 2;
        }
        
        .card:active {
            transform: scale(0.97);
        }
        
        .card .image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            background: #E8ECF0;
        }
        
        .card .image-placeholder {
            width: 100%;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            background: #E8ECF0;
            color: #B0B8C0;
        }
        
        .card .info {
            padding: 18px 16px 20px;
            text-align: center;
        }
        
        .card .name {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            font-weight: 300;
            font-size: 18px;
            letter-spacing: 1.5px;
            color: #000000;
            text-transform: uppercase;
            line-height: 1.2;
        }
        
        .card .price {
            color: var(--color-primary);
            font-size: 17px;
            font-weight: 400;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }
        
        /* ================================================================
           ФУТЕР — пустой
           ================================================================ */
        .footer {
            grid-column: 1 / -1;
            padding: 12px 14px 4px 14px;
            margin-top: 8px;
        }
        
        /* ================================================================
           МОДАЛЬНОЕ ОКНО
           ================================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 85, 164, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            max-width: 520px;
            width: 100%;
            padding: 32px 28px 28px;
            box-shadow: 0 20px 80px rgba(0, 85, 164, 0.15);
            animation: modalFadeIn 0.4s ease;
            max-height: 90vh;
            overflow-y: auto;
            border-top: 4px solid var(--color-primary);
        }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .modal .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--color-text-light);
            cursor: pointer;
            transition: color var(--transition);
            padding: 0 4px;
        }
        
        .modal .modal-close:hover {
            color: var(--color-text-primary);
        }
        
        .modal h2 {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            font-size: 22px;
            font-weight: 200;
            letter-spacing: 2px;
            color: #000000;
            text-transform: uppercase;
            margin-top: 4px;
            margin-bottom: 6px;
        }
        
        .modal .modal-price {
            font-size: 20px;
            color: var(--color-primary);
            font-weight: 400;
            margin-bottom: 12px;
        }
        
        .modal .modal-desc {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            font-size: 15px;
            color: var(--color-text-secondary);
            font-weight: 300;
            line-height: 1.7;
            margin-bottom: 16px;
        }
        
        .modal .modal-section {
            padding: 12px 0;
            border-top: 1px solid rgba(0, 85, 164, 0.04);
        }
        
        .modal .modal-section h4 {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            font-size: 12px;
            letter-spacing: 1px;
            color: var(--color-text-light);
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 400;
        }
        
        .modal .modal-section p {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            font-size: 15px;
            color: var(--color-text-secondary);
            font-weight: 300;
            line-height: 1.6;
            white-space: pre-line;
        }
        
        .modal .btn-close-modal {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: var(--color-primary);
            color: var(--color-white);
            border: none;
            border-radius: 12px;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 4px 20px rgba(0, 85, 164, 0.2);
        }
        
        .modal .btn-close-modal:hover {
            background: var(--color-primary-dark);
            box-shadow: 0 8px 30px rgba(0, 85, 164, 0.3);
            transform: translateY(-2px);
        }
        
        /* ================================================================
           АДАПТИВНОСТЬ
           ================================================================ */
        @media (max-width: 768px) {
            body { padding: 12px; }
            
            .top-bar {
                flex-direction: column;
                padding: 4px 0 12px 0;
                gap: 10px;
            }
            
            .top-bar .social-left {
                flex: none;
                justify-content: center;
                width: 100%;
            }
            
            .top-bar .logo-center img {
                width: 180px;
            }
            
            .top-bar .contact-right {
                flex: none;
                text-align: center;
                font-size: 13px;
                width: 100%;
            }
            
            .header {
                padding: 24px 20px 20px 20px;
                margin-bottom: 20px;
                border-radius: 12px;
                border-width: 1px;
            }
            
            .header h1 { font-size: 32px; letter-spacing: 4px; }
            .header .subtitle { font-size: 14px; }
            
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            
            .card .image { height: 160px; }
            .card .info { padding: 14px 12px 16px; }
            .card .name { font-size: 15px; }
            .card .price { font-size: 15px; }
            
            .geo-shape:nth-child(1),
            .geo-shape:nth-child(2),
            .geo-shape:nth-child(5) { display: none; }
        }
        
        @media (max-width: 480px) {
            .top-bar .logo-center img { width: 150px; }
            .top-bar .social-left { gap: 12px; }
            .top-bar .social-left .social-icon { width: 32px; height: 32px; font-size: 15px; }
            .top-bar .contact-right { font-size: 11px; }
            
            .header h1 { font-size: 24px; letter-spacing: 2px; }
            .header .subtitle { font-size: 12px; }
            .header { padding: 18px 14px 16px; border-radius: 10px; }
            
            .grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

                pros: '✅ Опытные мастера\n✅ Гарантия на работы\n✅ Используем качественный крепёж\n✅ Соблюдаем технологию',
                cons: '❌ Требует предварительного заказа\n❌ Зависит от погодных условий',
                care: '🔧 Используем нержавеющий крепёж\n📏 Соблюдаем зазоры (5-8 мм)\n🌬️ Обеспечиваем вентиляцию\n🛡️ Обработка защитными составами',
                specs: '⏳ Срок службы: от 15 лет\n📊 Рекомендации: Уклон 1-2%\n💧 Защита от влаги'
            }

        // ================================================================
        // РЕНДЕР
        // ================================================================
        
        function renderMainMenu() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            categories.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img class="image" src="${cat.image}" alt="${cat.name}" loading="lazy" 
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="image-placeholder" style="display:none;">📦</div>
                    <div class="info">
                        <div class="name">${cat.name}</div>
                        <div class="price">${cat.price}</div>
                    </div>
                `;
                card.onclick = () => openModal(cat.id);
                grid.appendChild(card);
            });
            
            // Пустой футер
            const footer = document.createElement('div');
            footer.className = 'footer';
            grid.appendChild(footer);
        }

        // ================================================================
        // МОДАЛЬНОЕ ОКНО
        // ================================================================
        
        function openModal(id) {
            const data = categories.find(c => c.id === id);
            const detail = details[id];
            if (!data || !detail) return;
            
            document.getElementById('modalName').textContent = data.name;
            document.getElementById('modalPrice').textContent = data.price;
            document.getElementById('modalDesc').textContent = detail.desc;
            document.getElementById('modalPros').textContent = detail.pros;
            document.getElementById('modalCons').textContent = detail.cons;
            document.getElementById('modalCare').textContent = detail.care;
            document.getElementById('modalSpecs').textContent = detail.specs;
            
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        document.getElementById('modalClose').onclick = closeModal;
        document.getElementById('modalCloseBtn').onclick = closeModal;
        document.getElementById('modalOverlay').onclick = (e) => {
            if (e.target === e.currentTarget) closeModal();
        };
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        renderMainMenu();
    </script>
</body>
