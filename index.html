                    <div class="info">
                        <div class="name">${cat.name}</div>
                        <div class="price">${cat.price}</div>
                        <div class="badge">${cat.badge}</div>
                    </div>
                `;
                card.onclick = () => openModal(cat.id);
                grid.appendChild(card);
            });
            
            // Логотип
            const logoWrapper = document.createElement('div');
            logoWrapper.className = 'logo-wrapper';
            logoWrapper.innerHTML = `
                <img src="https://principfloor.ru/bitrix/templates/dresscodeV2/images/logo.png?v=1601247390" 
                     alt="PRINCIP FLOOR">
            `;
            logoWrapper.onclick = () => {
                window.open('https://principfloor.ru/', '_blank');
            };
            grid.appendChild(logoWrapper);
            
            // Футер
            const footer = document.createElement('div');
            footer.className = 'footer';
            footer.innerHTML = `
                <p>© 2026 PRINCIP FLOOR. Все права защищены.</p>
                <div class="contacts">
                    <a href="tel:+73433282772">+7 (343) 328-27-72</a>
                    &nbsp;·&nbsp;
                    <a href="mailto:sl@principfloor.ru">sl@principfloor.ru</a>
                    &nbsp;·&nbsp;
                    <a href="https://principfloor.ru" target="_blank">principfloor.ru</a>
                </div>
            `;
            grid.appendChild(footer);
        }

        // ================================================================
        // МОДАЛЬНОЕ ОКНО
        // ================================================================
        
        function openModal(id) {
            const data = categories.find(c => c.id === id);
            if (!data) return;
            
            document.getElementById('modalName').textContent = data.name;
            document.getElementById('modalPrice').textContent = data.price;
            document.getElementById('modalDesc').textContent = data.desc;
            document.getElementById('modalPros').textContent = data.pros;
            document.getElementById('modalCons').textContent = data.cons;
            document.getElementById('modalCare').textContent = data.care;
            document.getElementById('modalSpecs').textContent = data.specs;
            
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        // Закрытие модального окна
        document.getElementById('modalClose').onclick = closeModal;
        document.getElementById('modalCloseBtn').onclick = closeModal;
        document.getElementById('modalOverlay').onclick = (e) => {
            if (e.target === e.currentTarget) closeModal();
        };
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // ================================================================
        // ЗАПУСК
        // ================================================================
        
        renderMainMenu();
    </script>
</body>
</html>
