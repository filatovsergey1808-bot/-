<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Террасная доска | PRINCIP FLOOR</title>
    <meta name="description" content="Премиальная террасная доска из натурального дерева и ДПК. PRINCIP FLOOR — качество, проверенное временем.">
    <meta name="keywords" content="террасная доска, декинг, ДПК, лиственница, PRINCIP FLOOR">
    
    <style>
        /* ================================================================
           CSS ПЕРЕМЕННЫЕ
           ================================================================ */
        :root {
            --color-primary: #0055A4;
            --color-primary-dark: #003D7A;
            --color-primary-light: #E8F0F8;
            --color-primary-soft: rgba(0, 85, 164, 0.15);
            --color-white: #FFFFFF;
            --color-light-bg: #F0F3F8;
            --color-text-primary: #000000;
            --color-text-secondary: #4A4A5A;
            --color-text-light: #8A8A9A;
            --color-border: #E5E8EC;
            --shadow-card: 0 4px 16px rgba(0, 85, 164, 0.08);
            --shadow-card-hover: 0 12px 40px rgba(0, 85, 164, 0.12);
            --radius-card: 16px;
            --transition: 0.3s ease;
        }

        /* ================================================================
           ОСНОВНОЙ ФОН
           ================================================================ */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            min-height: 100vh;
            background: var(--color-light-bg);
            color: var(--color-text-primary);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 85, 164, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, rgba(0, 85, 164, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 85, 165, 0.03) 0%, transparent 50%),
                linear-gradient(180deg, #F8F9FC 0%, #E8ECF4 100%);
            pointer-events: none;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            z-index: 0;
            pointer-events: none;
            background: 
                repeating-linear-gradient(
                    45deg,
                    transparent 0px,
                    transparent 60px,
                    rgba(0, 85, 164, 0.04) 60px,
                    rgba(0, 85, 164, 0.07) 61px,
                    rgba(0, 85, 164, 0.04) 62px,
                    transparent 63px,
                    transparent 120px
                ),
                repeating-linear-gradient(
                    -45deg,
                    transparent 0px,
                    transparent 200px,
                    rgba(0, 85, 164, 0.025) 200px,
                    rgba(0, 85, 164, 0.06) 202px,
                    rgba(0, 85, 164, 0.025) 204px,
                    transparent 206px,
                    transparent 400px
                ),
                repeating-linear-gradient(
                    30deg,
                    transparent 0px,
                    transparent 140px,
                    rgba(0, 85, 164, 0.02) 140px,
                    rgba(0, 85, 164, 0.05) 141px,
                    rgba(0, 85, 164, 0.02) 142px,
                    transparent 143px,
                    transparent 280px
                ),
                repeating-linear-gradient(
                    -30deg,
                    transparent 0px,
                    transparent 90px,
                    rgba(0, 85, 164, 0.03) 90px,
                    rgba(0, 85, 164, 0.08) 92px,
                    rgba(0, 85, 164, 0.03) 94px,
                    transparent 96px,
                    transparent 180px
                ),
                repeating-linear-gradient(
                    15deg,
                    transparent 0px,
                    transparent 160px,
                    rgba(0, 85, 164, 0.015) 160px,
                    rgba(0, 85, 164, 0.04) 162px,
                    rgba(0, 85, 164, 0.015) 164px,
                    transparent 166px,
                    transparent 320px
                ),
                repeating-linear-gradient(
                    -15deg,
                    transparent 0px,
                    transparent 240px,
                    rgba(0, 85, 164, 0.01) 240px,
                    rgba(0, 85, 164, 0.035) 243px,
                    rgba(0, 85, 164, 0.01) 246px,
                    transparent 249px,
                    transparent 480px
                ),
                repeating-linear-gradient(
                    50deg,
                    transparent 0px,
                    transparent 350px,
                    rgba(0, 85, 164, 0.01) 350px,
                    rgba(0, 85, 164, 0.03) 354px,
                    rgba(0, 85, 164, 0.01) 358px,
                    transparent 362px,
                    transparent 700px
                ),
                repeating-linear-gradient(
                    -50deg,
                    transparent 0px,
                    transparent 40px,
                    rgba(0, 85, 164, 0.02) 40px,
                    rgba(0, 85, 164, 0.05) 41px,
                    rgba(0, 85, 164, 0.02) 42px,
                    transparent 43px,
                    transparent 80px
                );
            transform: rotate(0deg) scale(1.1);
            animation: gridFloat 25s ease-in-out infinite alternate;
        }
        
        @keyframes gridFloat {
            0% { transform: rotate(0deg) scale(1.05) translate(0, 0); }
            20% { transform: rotate(0.5deg) scale(1.08) translate(1%, -1%); }
            40% { transform: rotate(-0.3deg) scale(1.03) translate(-1%, 1%); }
            60% { transform: rotate(0.8deg) scale(1.1) translate(1%, 1%); }
            80% { transform: rotate(-0.5deg) scale(1.06) translate(-1%, -1%); }
            100% { transform: rotate(0.3deg) scale(1.12) translate(0, 0); }
        }
        
        .geometry-overlay {
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            z-index: 0;
            pointer-events: none;
            background: 
                repeating-linear-gradient(
                    35deg,
                    transparent 0px,
                    transparent 180px,
                    rgba(255, 255, 255, 0.04) 180px,
                    rgba(255, 255, 255, 0.01) 181px,
                    transparent 182px,
                    transparent 360px
                ),
                repeating-linear-gradient(
                    -35deg,
                    transparent 0px,
                    transparent 220px,
                    rgba(255, 255, 255, 0.03) 220px,
                    rgba(255, 255, 255, 0.01) 221px,
                    transparent 222px,
                    transparent 440px
                ),
                radial-gradient(circle at 30% 40%, rgba(255,255,255,0.02) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(255,255,255,0.015) 0%, transparent 40%);
            transform: rotate(0deg) scale(1.1);
            animation: gridFloat 20s ease-in-out infinite alternate-reverse;
        }
        
        .geo-shapes {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .geo-shape {
            position: absolute;
            border: 1px solid rgba(0, 85, 164, 0.04);
            border-radius: 2px;
            animation: shapeFloat 18s ease-in-out infinite alternate;
        }
        
        .geo-shape:nth-child(1) {
            width: 400px;
            height: 200px;
            top: -50px;
            right: -100px;
            transform: rotate(25deg);
            background: linear-gradient(135deg, rgba(0, 85, 164, 0.015), rgba(0, 85, 164, 0.05));
            animation-duration: 22s;
        }
        
        .geo-shape:nth-child(2) {
            width: 150px;
            height: 300px;
            bottom: 50px;
            left: -60px;
            transform: rotate(-15deg);
            background: linear-gradient(225deg, rgba(0, 85, 164, 0.01), rgba(0, 85, 164, 0.04));
            animation-duration: 26s;
            animation-delay: -6s;
        }
        
        .geo-shape:nth-child(3) {
            width: 100px;
            height: 100px;
            top: 35%;
            left: 55%;
            transform: rotate(45deg);
            background: linear-gradient(45deg, rgba(0, 85, 164, 0.02), rgba(0, 85, 164, 0.06));
            animation-duration: 30s;
            animation-delay: -12s;
        }
        
        .geo-shape:nth-child(4) {
            width: 250px;
            height: 150px;
            top: 15%;
            left: 15%;
            transform: rotate(60deg);
            background: linear-gradient(135deg, rgba(0, 85, 164, 0.01), rgba(0, 85, 164, 0.04));
            animation-duration: 24s;
            animation-delay: -4s;
        }
        
        .geo-shape:nth-child(5) {
            width: 180px;
            height: 180px;
            bottom: -30px;
            right: 25%;
            transform: rotate(-30deg);
            background: linear-gradient(225deg, rgba(0, 85, 164, 0.015), rgba(0, 85, 164, 0.05));
            animation-duration: 28s;
            animation-delay: -9s;
        }
        
        @keyframes shapeFloat {
            0% { transform: rotate(25deg) translate(0, 0) scale(1); opacity: 0.4; }
            33% { transform: rotate(35deg) translate(12px, -18px) scale(1.06); opacity: 0.9; }
            66% { transform: rotate(15deg) translate(-12px, 12px) scale(0.94); opacity: 0.5; }
            100% { transform: rotate(30deg) translate(6px, -6px) scale(1.03); opacity: 0.7; }
        }
        
        @keyframes shapeFloat2 {
            0% { transform: rotate(-15deg) translate(0, 0) scale(1); opacity: 0.3; }
            50% { transform: rotate(-25deg) translate(-18px, 12px) scale(1.08); opacity: 0.8; }
            100% { transform: rotate(-5deg) translate(12px, -12px) scale(0.94); opacity: 0.5; }
        }
        
        @keyframes shapeFloat3 {
            0% { transform: rotate(45deg) translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: rotate(55deg) translate(10px, -15px) scale(1.1); opacity: 0.8; }
        }
        
        .geo-shape:nth-child(2) { animation-name: shapeFloat2; }
        .geo-shape:nth-child(3) { animation-name: shapeFloat3; }
        .geo-shape:nth-child(4) { animation-name: shapeFloat2; }
        .geo-shape:nth-child(5) { animation-name: shapeFloat3; }
        
        /* ================================================================
           ОСНОВНОЙ КОНТЕНТ
           ================================================================ */
        #app {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        /* ================================================================
           ВЕРХНЯЯ ПАНЕЛЬ
           ================================================================ */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0 16px 0;
            gap: 20px;
        }
        
        .top-bar .social-left {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: flex-start;
        }
        
        .top-bar .social-left .social-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(0, 85, 164, 0.06);
            color: var(--color-primary);
            text-decoration: none;
            transition: all var(--transition);
            border: 1px solid rgba(0, 85, 164, 0.06);
            padding: 0;
        }
        
        .top-bar .social-left .social-icon:hover {
            background: var(--color-primary);
            color: #ffffff;
            border-color: var(--color-primary);
            transform: translateY(-3px);
            box-shadow: 0 4px 16px rgba(0, 85, 164, 0.2);
        }
        
        .top-bar .social-left .social-icon:active {
            transform: scale(0.92);
        }
        
        .top-bar .social-left .social-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            display: block;
        }
        
        .top-bar .social-left .social-icon:hover svg {
            fill: #ffffff;
        }
        
        .top-bar .logo-center {
            flex: 0 0 auto;
        }
        
        .top-bar .logo-center img {
            display: block;
            width: 220px;
            height: auto;
            filter: drop-shadow(0 2px 12px rgba(0, 85, 164, 0.08));
            transition: filter var(--transition);
            cursor: pointer;
        }
        
        .top-bar .logo-center img:hover {
            filter: drop-shadow(0 4px 24px rgba(0, 85, 164, 0.16));
        }
        
        .top-bar .contact-right {
            flex: 1;
            text-align: right;
            font-size: 14px;
            color: var(--color-text-secondary);
            font-weight: 300;
            letter-spacing: 0.3px;
        }
        
        .top-bar .contact-right a {
            color: var(--color-primary);
            text-decoration: none;
            transition: color var(--transition);
            font-weight: 400;
        }
        
        .top-bar .contact-right a:hover {
            color: var(--color-primary-dark);
        }
        
        /* ================================================================
           ШАПКА
           ================================================================ */
        .header {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 32px 32px 28px 32px;
            margin-bottom: 28px;
            box-shadow: 0 8px 40px rgba(0, 85, 164, 0.06);
            border: 1px solid rgba(0, 85, 164, 0.2);
            position: relative;
            overflow: hidden;
            text-align: center;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            background: 
                repeating-linear-gradient(
                    15deg,
                    transparent 0px,
                    transparent 80px,
                    rgba(0, 85, 164, 0.03) 80px,
                    rgba(0, 85, 164, 0.06) 81px,
                    rgba(0, 85, 164, 0.03) 82px,
                    transparent 83px,
                    transparent 160px
                ),
                repeating-linear-gradient(
                    -25deg,
                    transparent 0px,
                    transparent 120px,
                    rgba(0, 85, 164, 0.02) 120px,
                    rgba(0, 85, 164, 0.05) 122px,
                    rgba(0, 85, 164, 0.02) 124px,
                    transparent 126px,
                    transparent 240px
                ),
                repeating-linear-gradient(
                    5deg,
                    transparent 0px,
                    transparent 200px,
                    rgba(0, 85, 164, 0.015) 200px,
                    rgba(0, 85, 164, 0.04) 203px,
                    rgba(0, 85, 164, 0.015) 206px,
                    transparent 209px,
                    transparent 400px
                ),
                repeating-linear-gradient(
                    -40deg,
                    transparent 0px,
                    transparent 160px,
                    rgba(0, 85, 164, 0.01) 160px,
                    rgba(0, 85, 164, 0.035) 163px,
                    rgba(0, 85, 164, 0.01) 166px,
                    transparent 169px,
                    transparent 320px
                );
            opacity: 0.5;
        }
        
        .header h1 {
            position: relative;
            z-index: 1;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            font-size: 48px;
            font-weight: 200;
            letter-spacing: 6px;
            color: #000000;
            text-transform: uppercase;
            line-height: 1.05;
        }
        
        .header .subtitle {
            position: relative;
            z-index: 1;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            font-size: 16px;
            font-weight: 200;
            color: var(--color-text-secondary);
            margin-top: 6px;
            letter-spacing: 2px;
        }
        
        /* ================================================================
           КАРУСЕЛЬ — ФИКСИРОВАННАЯ
           ================================================================ */
        .carousel-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-card);
            padding: 20px 0;
            min-height: 440px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .carousel-track {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            align-items: center;
            will-change: transform;
        }
        
        .carousel-slide {
            flex: 0 0 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 60px;
            min-height: 400px;
            position: relative;
        }
        
        /* ================================================================
           КАРТОЧКА
           ================================================================ */
        .card {
            flex: 0 0 100%;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius-card);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s ease;
            border: 1.5px solid transparent;
            min-height: 380px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 85, 164, 0.06);
            opacity: 0.3;
            transform: scale(0.9);
            filter: blur(4px);
            pointer-events: none;
            margin: 0;
        }
        
        .card.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);
            pointer-events: all;
            border-color: rgba(0, 85, 164, 0.15);
            box-shadow: 0 12px 50px rgba(0, 85, 164, 0.12);
            z-index: 3;
        }
        
        .card.active:hover {
            transform: scale(1.02);
            box-shadow: 0 16px 60px rgba(0, 85, 164, 0.15);
            border-color: rgba(0, 85, 164, 0.25);
            background: rgba(255, 255, 255, 0.98);
        }
        
        .card:active {
            transform: scale(0.97);
        }
        
        .card .image {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
            background: #E8ECF0;
        }
        
        .card .image-placeholder {
            width: 100%;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            background: #E8ECF0;
            color: #B0B8C0;
        }
        
        .card .info {
            padding: 22px 20px 24px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .card .name {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            font-weight: 300;
            font-size: 24px;
            letter-spacing: 2px;
            color: #000000;
            text-transform: uppercase;
            line-height: 1.2;
        }
        
        .card .price {
            color: var(--color-primary);
            font-size: 22px;
            font-weight: 400;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }
        
        /* ================================================================
           КНОПКИ НАВИГАЦИИ
           ================================================================ */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0, 85, 164, 0.1);
            transition: all var(--transition);
            padding: 30px 8px;
            opacity: 0.2;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border-radius: 0;
        }
        
        .carousel-btn:hover {
            opacity: 0.6;
            color: var(--color-primary);
            background: rgba(0, 85, 164, 0.04);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        .carousel-btn:active {
            transform: translateY(-50%) scale(0.95);
        }
        
        .carousel-btn.prev {
            left: 4px;
        }
        
        .carousel-btn.next {
            right: 4px;
        }
        
        .carousel-btn svg {
            width: 36px;
            height: 36px;
            fill: currentColor;
            transition: transform var(--transition);
        }
        
        .carousel-btn:hover svg {
            transform: scale(1.15);
        }
        
        /* ================================================================
           ИНДИКАТОРЫ
           ================================================================ */
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 16px 0 8px 0;
        }
        
        .carousel-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1.5px solid rgba(0, 85, 164, 0.15);
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all var(--transition);
        }
        
        .carousel-dot.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(0, 85, 164, 0.15);
        }
        
        .carousel-dot:hover {
            border-color: var(--color-primary);
            transform: scale(1.1);
        }
        
        /* ================================================================
           ФУТЕР
           ================================================================ */
        .footer {
            grid-column: 1 / -1;
            padding: 12px 14px 4px 14px;
            margin-top: 8px;
        }
        
        /* ================================================================
           МОДАЛЬНОЕ ОКНО
           ================================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 85, 164, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            max-width: 520px;
            width: 100%;
            padding: 32px 28px 28px;
            box-shadow: 0 20px 80px rgba(0, 85, 164, 0.15);
            animation: modalFadeIn 0.4s ease;
            max-height: 90vh;
            overflow-y: auto;
            border-top: 4px solid var(--color-primary);
        }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .modal .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--color-text-light);
            cursor: pointer;
            transition: color var(--transition);
            padding: 0 4px;
        }
        
        .modal .modal-close:hover {
            color: var(--color-text-primary);
        }
        
        .modal h2 {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            font-size: 22px;
            font-weight: 200;
            letter-spacing: 2px;
            color: #000000;
            text-transform: uppercase;
            margin-top: 4px;
            margin-bottom: 6px;
        }
        
        .modal .modal-price {
            font-size: 20px;
            color: var(--color-primary);
            font-weight: 400;
            margin-bottom: 12px;
        }
        
        .modal .modal-desc {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            font-size: 15px;
            color: var(--color-text-secondary);
            font-weight: 300;
            line-height: 1.7;
            margin-bottom: 16px;
        }
        
        .modal .modal-section {
            padding: 12px 0;

        // ================================================================

        let currentRealIndex = 0;

        const AUTO_PLAY_INTERVAL = 4000;
        let isTransitioning = false;
        let totalRealSlides = 0;
        let slideWidth = 100;
        
        function renderCarousel() {
            const track = document.getElementById('carouselTrack');
            const dotsContainer = document.getElementById('dotsContainer');
            
            const totalItems = categories.length;
            totalRealSlides = totalItems;
            
            track.innerHTML = '';
            
            // Создаём реальные слайды
            for (let i = 0; i < totalItems; i++) {
                const cat = categories[i];
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.dataset.index = i;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = i;
                card.innerHTML = `
                    <img class="image" src="${cat.image}" alt="${cat.name}" loading="lazy" 
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="image-placeholder" style="display:none;">📦</div>
                    <div class="info">
                        <div class="name">${cat.name}</div>
                        <div class="price">${cat.price}</div>
                    </div>
                `;
                card.onclick = () => openModal(cat.id);
                slide.appendChild(card);
                track.appendChild(slide);
            }
            
            // Создаём клоны для бесконечной прокрутки
            const firstClone = track.children[0].cloneNode(true);
            const lastClone = track.children[track.children.length - 1].cloneNode(true);
            
            // Добавляем клоны
            track.appendChild(firstClone);
            track.insertBefore(lastClone, track.children[0]);
            
            // Устанавливаем начальную позицию на первом реальном слайде
            currentRealIndex = 0;
            const totalSlides = track.children.length;
            const offset = -(currentRealIndex + 1) * slideWidth;
            track.style.transform = `translateX(${offset}%)`;
            
            // Обновляем dots
            dotsContainer.innerHTML = '';
            for (let i = 0; i < totalRealSlides; i++) {
                const dot = document.createElement('div');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(i);
                dotsContainer.appendChild(dot);
            }
            
            updateCarousel();
            startAutoPlay();
        }
        
        function updateCarousel() {
            const track = document.getElementById('carouselTrack');
            const slides = track.querySelectorAll('.carousel-slide');
            const dots = document.querySelectorAll('.carousel-dot');
            
            // Позиция: реальный индекс + 1 (из-за клона в начале)
            const offset = -(currentRealIndex + 1) * slideWidth;
            track.style.transform = `translateX(${offset}%)`;
            
            // Обновляем активные карточки
            slides.forEach((slide, slideIndex) => {
                const cards = slide.querySelectorAll('.card');
                // Индекс слайда в реальных данных (без учёта клонов)
                let realIndex = slideIndex - 1;
                if (slideIndex === 0) realIndex = totalRealSlides - 1;
                if (slideIndex === slides.length - 1) realIndex = 0;
                
                const isActive = realIndex === currentRealIndex;
                
                cards.forEach((card) => {
                    card.classList.remove('active');
                    if (isActive) {
                        card.classList.add('active');
                    }
                });
            });
            
            // Обновляем точки
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentRealIndex);
            });
        }
        
        function goToSlide(index, instant = false) {
            if (isTransitioning) return;
            if (index < 0) index = totalRealSlides - 1;
            if (index >= totalRealSlides) index = 0;
            
            currentRealIndex = index;
            
            const track = document.getElementById('carouselTrack');
            const slides = track.querySelectorAll('.carousel-slide');
            
            if (instant) {
                track.style.transition = 'none';
                updateCarousel();
                track.offsetHeight;
                track.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            } else {
                updateCarousel();
            }
            
            // Проверяем, не дошли ли до клонов
            const totalSlides = slides.length;
            const offset = -(currentRealIndex + 1) * slideWidth;
            
            // Если мы на первом клоне (индекс 0)
            if (offset === 0) {
                isTransitioning = true;
                setTimeout(() => {
                    currentRealIndex = totalRealSlides - 1;
                    const newOffset = -(currentRealIndex + 1) * slideWidth;
                    track.style.transition = 'none';
                    track.style.transform = `translateX(${newOffset}%)`;
                    track.offsetHeight;
                    track.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                    updateCarousel();
                    setTimeout(() => {
                        isTransitioning = false;
                    }, 50);
                }, 650);
            }
            // Если мы на последнем клоне
            else if (offset === -(totalSlides - 1) * slideWidth) {
                isTransitioning = true;
                setTimeout(() => {
                    currentRealIndex = 0;
                    const newOffset = -(currentRealIndex + 1) * slideWidth;
                    track.style.transition = 'none';
                    track.style.transform = `translateX(${newOffset}%)`;
                    track.offsetHeight;
                    track.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                    updateCarousel();
                    setTimeout(() => {
                        isTransitioning = false;
                    }, 50);
                }, 650);
            }
            
            resetAutoPlay();
        }
        
        function nextSlide() {
            if (isTransitioning) return;
            goToSlide(currentRealIndex + 1);
        }
        
        function prevSlide() {
            if (isTransitioning) return;
            goToSlide(currentRealIndex - 1);
        }
        
        function startAutoPlay() {
            stopAutoPlay();
            autoPlayTimer = setInterval(() => {
                nextSlide();
            }, AUTO_PLAY_INTERVAL);
        }
        
        function stopAutoPlay() {
            if (autoPlayTimer) {
                clearInterval(autoPlayTimer);
                autoPlayTimer = null;
            }
        }
        
        function resetAutoPlay() {
            stopAutoPlay();
            startAutoPlay();
        }
        
        function pauseAutoPlay() {
            stopAutoPlay();
        }
        
        function resumeAutoPlay() {
            startAutoPlay();
        }

        // ================================================================
        // МОДАЛЬНОЕ ОКНО
        // ================================================================
        
        function openModal(id) {
            const data = categories.find(c => c.id === id);
            const detail = details[id];
            if (!data || !detail) return;
            
            document.getElementById('modalName').textContent = data.name;
            document.getElementById('modalPrice').textContent = data.price;
            document.getElementById('modalDesc').textContent = detail.desc;
            document.getElementById('modalPros').textContent = detail.pros;
            document.getElementById('modalCons').textContent = detail.cons;
            document.getElementById('modalCare').textContent = detail.care;
            document.getElementById('modalSpecs').textContent = detail.specs;
            
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            pauseAutoPlay();
        }
        
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = 'auto';
            resumeAutoPlay();
        }
        
        // ================================================================
        // ЗАПУСК
        // ================================================================
        
        document.addEventListener('DOMContentLoaded', () => {
            renderCarousel();
            
            const wrapper = document.getElementById('carouselWrapper');
            
            document.getElementById('prevBtn').onclick = (e) => {
                e.stopPropagation();
                prevSlide();
            };
            document.getElementById('nextBtn').onclick = (e) => {
                e.stopPropagation();
                nextSlide();
            };
            
            wrapper.addEventListener('mouseenter', pauseAutoPlay);
            wrapper.addEventListener('mouseleave', resumeAutoPlay);
            wrapper.addEventListener('touchstart', pauseAutoPlay);
            wrapper.addEventListener('touchend', resumeAutoPlay);
            
            document.getElementById('modalClose').onclick = closeModal;
            document.getElementById('modalCloseBtn').onclick = closeModal;
            document.getElementById('modalOverlay').onclick = (e) => {
                if (e.target === e.currentTarget) closeModal();
            };
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
                if (e.key === 'ArrowLeft') prevSlide();
                if (e.key === 'ArrowRight') nextSlide();
            });
        });
    </script>
</body>
</html>
