            color: #4A4A5A;
            margin-top: 6px;

           КАРУСЕЛЬ
           ================================================================ */

            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .carousel-track {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            align-items: center;
            will-change: transform;
        }

        .carousel-slide {
            flex: 0 0 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 40px;
            min-height: 400px;
        }

        /* ================================================================
           КАРТОЧКА
           ================================================================ */
        .card {
            flex: 0 0 100%;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s ease;
            border: 1.5px solid transparent;
            min-height: 380px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 85, 164, 0.06);
            opacity: 0.2;
            transform: scale(0.85);
            filter: blur(4px);
            pointer-events: none;
        }

        .card.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);
            pointer-events: all;
            border-color: rgba(0, 85, 164, 0.15);
            box-shadow: 0 12px 50px rgba(0, 85, 164, 0.12);
            z-index: 3;
        }

        .card.active:hover {
            transform: scale(1.02);
            box-shadow: 0 16px 60px rgba(0, 85, 164, 0.15);
            border-color: rgba(0, 85, 164, 0.25);
            background: rgba(255, 255, 255, 0.98);
        }

        .card .image {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
            background: #E8ECF0;
        }

        .card .image-placeholder {
            width: 100%;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            background: #E8ECF0;
            color: #B0B8C0;
        }

        .card .info {
            padding: 22px 20px 24px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card .name {
            font-weight: 300;
            font-size: 24px;
            letter-spacing: 2px;
            color: #000000;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .card .price {
            color: #0055A4;
            font-size: 22px;
            font-weight: 400;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        /* ================================================================
           КНОПКИ НАВИГАЦИИ
           ================================================================ */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0, 85, 164, 0.1);
            transition: all 0.3s ease;
            padding: 30px 8px;
            opacity: 0.2;
            backdrop-filter: blur(2px);
            border-radius: 0;
        }

        .carousel-btn:hover {
            opacity: 0.6;
            color: #0055A4;
            background: rgba(0, 85, 164, 0.04);
            backdrop-filter: blur(8px);
        }

        .carousel-btn:active {

        }

        .carousel-btn.prev {
            left: 4px;
        }

        .carousel-btn.next {
            right: 4px;
        }

        .carousel-btn svg {
            width: 36px;
            height: 36px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .carousel-btn:hover svg {
            transform: scale(1.15);
        }

        /* ================================================================
           ТОЧКИ
           ================================================================ */
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 10px;

        .carousel-dot {

            height: 10px;
            border-radius: 50%;
            border: 1.5px solid rgba(0, 85, 164, 0.15);
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;

            to {

            color: #FFFFFF;

            border-radius: 12px;

            font-weight: 300;
            letter-spacing: 2px;

            }

            .card .price {

        }

        @media (max-width: 480px) {
            .header h1 {

                letter-spacing: 2px;
            }

                font-size: 12px;
            }

                min-height: 260px;
            }

            .carousel-slide {

            }

                font-size: 16px;
                letter-spacing: 1px;
            }

                font-size: 15px;
            }

            .carousel-btn {
                padding: 12px 4px;
            }

            .carousel-btn svg {
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>
<body>

                care: '🔧 Используем нержавеющий крепёж\n📏 Соблюдаем зазоры (5-8 мм)\n🌬️ Обеспечиваем вентиляцию\n🛡️ Обработка защитными составами',

        // ================================================================
        // КАРУСЕЛЬ
        // ================================================================
        let currentIndex = 0;
        let realIndex = 0;
        let totalSlides = 0;
        let autoPlayTimer = null;
        const AUTO_PLAY_INTERVAL = 4000;
        let isTransitioning = false;
        let track, slides;

        function initCarousel() {
            track = document.getElementById('carouselTrack');
            const dotsContainer = document.getElementById('dotsContainer');

            // Очищаем трек
            track.innerHTML = '';

            // Создаём реальные слайды
            categories.forEach((cat, i) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.dataset.index = i;

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img class="image" src="${cat.image}" alt="${cat.name}" loading="lazy" 
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="image-placeholder" style="display:none;">📦</div>
                    <div class="info">
                        <div class="name">${cat.name}</div>
                        <div class="price">${cat.price}</div>
                    </div>
                `;
                card.onclick = () => openModal(cat.id);
                slide.appendChild(card);
                track.appendChild(slide);
            });

            // Клонируем первый и последний слайд для бесконечной прокрутки
            const firstClone = track.children[0].cloneNode(true);
            const lastClone = track.children[track.children.length - 1].cloneNode(true);
            track.appendChild(firstClone);
            track.insertBefore(lastClone, track.children[0]);

            slides = track.querySelectorAll('.carousel-slide');
            totalSlides = slides.length;

            // Начальная позиция: первый реальный слайд
            realIndex = 0;
            currentIndex = realIndex + 1;
            updateCarousel(true);

            // Создаём точки
            dotsContainer.innerHTML = '';
            for (let i = 0; i < categories.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(i);
                dotsContainer.appendChild(dot);
            }

            startAutoPlay();
        }

        function updateCarousel(instant = false) {
            if (!track) return;

            if (instant) {
                track.style.transition = 'none';
            } else {
                track.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            }

            const offset = -currentIndex * 100;
            track.style.transform = `translateX(${offset}%)`;

            // Обновляем активные карточки
            slides.forEach((slide, idx) => {
                const cards = slide.querySelectorAll('.card');
                let isActive = false;
                if (idx === currentIndex) {
                    isActive = true;
                }
                // Для клонов: если мы на первом клоне (индекс 0), то активен последний реальный
                if (idx === 0 && currentIndex === totalSlides - 1) {
                    isActive = true;
                }
                // Если мы на последнем клоне (индекс totalSlides-1), то активен первый реальный
                if (idx === totalSlides - 1 && currentIndex === 0) {
                    isActive = true;
                }

                cards.forEach(card => {
                    card.classList.toggle('active', isActive);
                });
            });

            // Обновляем точки
            const dots = document.querySelectorAll('.carousel-dot');
            let dotIndex = realIndex;
            if (dotIndex < 0) dotIndex = categories.length - 1;
            if (dotIndex >= categories.length) dotIndex = 0;
            dots.forEach((dot, idx) => {
                dot.classList.toggle('active', idx === dotIndex);
            });

            // Принудительный reflow для instant перехода
            if (instant) {
                track.offsetHeight;
                track.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            }
        }

        function goToSlide(index, instant = false) {
            if (isTransitioning) return;
            if (index < 0) index = categories.length - 1;
            if (index >= categories.length) index = 0;

            realIndex = index;
            currentIndex = realIndex + 1;

            updateCarousel(instant);

            // Проверяем клоны
            if (currentIndex === 0) {
                // Дошли до первого клона → переходим на последний реальный
                isTransitioning = true;
                setTimeout(() => {
                    realIndex = categories.length - 1;
                    currentIndex = realIndex + 1;
                    updateCarousel(true);
                    setTimeout(() => { isTransitioning = false; }, 50);
                }, 650);
            } else if (currentIndex === totalSlides - 1) {
                // Дошли до последнего клона → переходим на первый реальный
                isTransitioning = true;
                setTimeout(() => {
                    realIndex = 0;
                    currentIndex = realIndex + 1;
                    updateCarousel(true);
                    setTimeout(() => { isTransitioning = false; }, 50);
                }, 650);
            }

            resetAutoPlay();
        }

        function nextSlide() {
            if (isTransitioning) return;
            goToSlide(realIndex + 1);
        }

        function prevSlide() {
            if (isTransitioning) return;
            goToSlide(realIndex - 1);
        }

        function startAutoPlay() {
            stopAutoPlay();
            autoPlayTimer = setInterval(() => {
                nextSlide();
            }, AUTO_PLAY_INTERVAL);
        }

        function stopAutoPlay() {
            if (autoPlayTimer) {
                clearInterval(autoPlayTimer);
                autoPlayTimer = null;
            }
        }

        function resetAutoPlay() {
            stopAutoPlay();
            startAutoPlay();
        }

        // ================================================================
        // МОДАЛЬНОЕ ОКНО
        // ================================================================
        function openModal(id) {
            const data = categories.find(c => c.id === id);
            const detail = details[id];
            if (!data || !detail) return;

            document.getElementById('modalName').textContent = data.name;
            document.getElementById('modalPrice').textContent = data.price;
            document.getElementById('modalDesc').textContent = detail.desc;
            document.getElementById('modalPros').textContent = detail.pros;
            document.getElementById('modalCons').textContent = detail.cons;
            document.getElementById('modalCare').textContent = detail.care;
            document.getElementById('modalSpecs').textContent = detail.specs;

            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            stopAutoPlay();
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = 'auto';
            startAutoPlay();
        }

        // ================================================================
        // ЗАПУСК
        // ================================================================
        document.addEventListener('DOMContentLoaded', () => {
            initCarousel();

            const wrapper = document.getElementById('carouselWrapper');

            document.getElementById('prevBtn').onclick = (e) => {
                e.stopPropagation();
                prevSlide();
            };

            document.getElementById('nextBtn').onclick = (e) => {
                e.stopPropagation();
                nextSlide();
            };

            wrapper.addEventListener('mouseenter', stopAutoPlay);
            wrapper.addEventListener('mouseleave', startAutoPlay);
            wrapper.addEventListener('touchstart', stopAutoPlay);
            wrapper.addEventListener('touchend', startAutoPlay);

            document.getElementById('modalClose').onclick = closeModal;
            document.getElementById('modalCloseBtn').onclick = closeModal;
            document.getElementById('modalOverlay').onclick = (e) => {
                if (e.target === e.currentTarget) closeModal();
            };

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
                if (e.key === 'ArrowLeft') prevSlide();
                if (e.key === 'ArrowRight') nextSlide();
            });
        });
    </script>
</body>
</html>
